workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile
    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: "com.beachtennis.recorder"
        APP_NAME: "BT Recorder"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true
        - pattern: develop
          include: true

    scripts:
      - name: Generate platform files
        script: |
          if [ ! -d "ios/Runner.xcodeproj" ] || [ ! -f "ios/Runner.xcodeproj/project.pbxproj" ] || [ $(wc -l < ios/Runner.xcodeproj/project.pbxproj) -lt 10 ]; then
            rm -rf ios android
            flutter create --org com.beachtennis --project-name beach_tennis_recorder .
          fi

      - name: Inject native VideoTrimPlugin into iOS project
        script: |
          # Copy the Swift plugin file into the generated ios/Runner directory.
          cp ios_native/VideoTrimPlugin.swift ios/Runner/VideoTrimPlugin.swift

          # Register the plugin in AppDelegate.swift by adding the channel setup.
          # The generated AppDelegate uses @objc class AppDelegate: FlutterAppDelegate.
          # We inject the plugin registration into the application(_:didFinishLaunchingWithOptions:) method.
          APPDELEGATE="ios/Runner/AppDelegate.swift"
          if [ -f "$APPDELEGATE" ]; then
            # Add AVFoundation import at the top if not present.
            grep -q "import AVFoundation" "$APPDELEGATE" || sed -i '' '1s/^/import AVFoundation\n/' "$APPDELEGATE"

            # Insert plugin registration before "return super.application".
            # This registers our MethodChannel so Flutter can call trimVideo.
            sed -i '' '/GeneratedPluginRegistrant.register/a\
            \    VideoTrimPlugin.register(with: self.registrar(forPlugin: "VideoTrimPlugin")!)
            ' "$APPDELEGATE"
          fi

          # Add VideoTrimPlugin.swift to the Xcode project build sources.
          # Ruby script to modify project.pbxproj via xcodeproj gem.
          gem install xcodeproj 2>/dev/null || true
          ruby - <<'RUBY'
          require 'xcodeproj'
          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)

          # Find the Runner target.
          target = project.targets.find { |t| t.name == 'Runner' }
          unless target
            puts "WARNING: Runner target not found, skipping xcodeproj modification"
            exit 0
          end

          # Find the Runner group.
          runner_group = project.main_group.find_subpath('Runner', true)
          unless runner_group
            puts "WARNING: Runner group not found, skipping xcodeproj modification"
            exit 0
          end

          # Check if already added.
          existing = runner_group.files.find { |f| f.display_name == 'VideoTrimPlugin.swift' }
          unless existing
            file_ref = runner_group.new_file('VideoTrimPlugin.swift')
            target.source_build_phase.add_file_reference(file_ref)
            project.save
            puts "Added VideoTrimPlugin.swift to Xcode project"
          else
            puts "VideoTrimPlugin.swift already in Xcode project"
          end
          RUBY

      - name: Set iOS deployment target and permissions
        script: |
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'BT Recorder precisa da camera para gravar partidas de beach tennis.'" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'BT Recorder precisa da camera para gravar partidas de beach tennis.'" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'BT Recorder precisa do microfone para gravar audio.'" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'BT Recorder precisa do microfone para gravar audio.'" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'BT Recorder precisa acessar fotos para salvar clipes.'" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'BT Recorder precisa acessar fotos para salvar clipes.'" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:1 string UIInterfaceOrientationLandscapeLeft" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:2 string UIInterfaceOrientationLandscapeRight" ios/Runner/Info.plist
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Create assets directory
        script: |
          mkdir -p assets/models
          if [ ! -f assets/models/ball_detector.tflite ]; then
            echo "placeholder" > assets/models/ball_detector.tflite
          fi

      - name: Disable code signing in Xcode project
        script: |
          # Disable automatic signing and set to manual with no team
          cd ios
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' '/DEVELOPMENT_TEAM/d' Runner.xcodeproj/project.pbxproj
          # Add CODE_SIGNING_ALLOWED = NO to all build configs
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER/CODE_SIGNING_ALLOWED = NO;\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER/g' Runner.xcodeproj/project.pbxproj

      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      - name: Build iOS for device (debug)
        script: |
          flutter build ios --debug --no-codesign
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build/ios/DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        script: |
          APP_PATH=$(find build/ios/DerivedData -name "Runner.app" -path "*Debug-iphoneos*" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "Runner.app" -type d 2>/dev/null | grep -v Simulator | head -1)
          fi
          echo "Using .app at: $APP_PATH"
          if [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/Runner.app
            zip -r beach_tennis_recorder.ipa Payload/
            echo "IPA size: $(du -sh beach_tennis_recorder.ipa | cut -f1)"
          else
            echo "No device .app found"
            exit 1
          fi

    artifacts:
      - "**/*.ipa"
      - "**/*.app"

    publishing:
      email:
        recipients:
          - daniel.eidi@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile
    environment:
      flutter: stable
      xcode: latest
      groups:
        - ios_credentials
        - app_store_connect
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.beachtennis.recorder

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Generate platform files
        script: |
          if [ ! -d "ios/Runner.xcodeproj" ] || [ $(wc -l < ios/Runner.xcodeproj/project.pbxproj) -lt 10 ]; then
            rm -rf ios android
            flutter create --org com.beachtennis --project-name beach_tennis_recorder .
          fi

      - name: Inject native VideoTrimPlugin into iOS project
        script: |
          cp ios_native/VideoTrimPlugin.swift ios/Runner/VideoTrimPlugin.swift

          APPDELEGATE="ios/Runner/AppDelegate.swift"
          if [ -f "$APPDELEGATE" ]; then
            grep -q "import AVFoundation" "$APPDELEGATE" || sed -i '' '1s/^/import AVFoundation\n/' "$APPDELEGATE"
            sed -i '' '/GeneratedPluginRegistrant.register/a\
            \    VideoTrimPlugin.register(with: self.registrar(forPlugin: "VideoTrimPlugin")!)
            ' "$APPDELEGATE"
          fi

          gem install xcodeproj 2>/dev/null || true
          ruby - <<'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/Runner.xcodeproj')
          target = project.targets.find { |t| t.name == 'Runner' }
          exit 0 unless target
          runner_group = project.main_group.find_subpath('Runner', true)
          exit 0 unless runner_group
          unless runner_group.files.find { |f| f.display_name == 'VideoTrimPlugin.swift' }
            file_ref = runner_group.new_file('VideoTrimPlugin.swift')
            target.source_build_phase.add_file_reference(file_ref)
            project.save
          end
          RUBY

      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Create assets directory
        script: |
          mkdir -p assets/models
          if [ ! -f assets/models/ball_detector.tflite ]; then
            echo "placeholder" > assets/models/ball_detector.tflite
          fi

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing
        script: |
          keychain initialize

      - name: Build IPA for TestFlight
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - mobile/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - daniel.eidi@gmail.com
        notify:
          success: true
          failure: true

  android-development:
    name: Android Development Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    working_directory: mobile
    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Generate platform files
        script: |
          if [ ! -d "android" ]; then
            flutter create --org com.beachtennis --project-name beach_tennis_recorder .
          fi

      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Create assets directory
        script: |
          mkdir -p assets/models
          if [ ! -f assets/models/ball_detector.tflite ]; then
            echo "placeholder" > assets/models/ball_detector.tflite
          fi

      - name: Build APK (Debug)
        script: |
          flutter build apk --debug

    artifacts:
      - mobile/build/**/outputs/**/*.apk
