name: beach_tennis_recorder
description: Beach tennis match recorder with automatic rally detection using on-device YOLOv8.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.11.0+2

  # Video processing
  video_player: ^2.9.2
  video_compress: ^3.1.3

  # On-device ML
  tflite_flutter: ^0.11.0

  # File system & paths
  path_provider: ^2.1.4
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1

  # Sharing
  share_plus: ^10.1.3

  # Preferences
  shared_preferences: ^2.3.4

  # State management
  provider: ^6.1.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
